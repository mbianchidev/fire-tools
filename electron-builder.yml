appId: dev.mb-consulting.firetools
productName: Fire Tools
copyright: Copyright © 2026 Fire Tools Contributors

# Artifact names MUST NOT contain spaces. `productName` ("Fire Tools") has one,
# and the space is mangled inconsistently across the update pipeline:
#   on-disk file -> "Fire Tools-..." (space)
#   latest*.yml  -> "Fire-Tools-..." (electron-updater sanitizes space to hyphen)
#   GitHub asset -> "Fire.Tools-..." (Releases rewrites space to a dot on upload)
# The manifest url (hyphen) then never matches the uploaded asset (dot) and
# electron-updater 404s. Pinning a space-free template keeps the on-disk file,
# the manifest url, and the uploaded asset byte-for-byte identical.
artifactName: "Fire-Tools-${version}-${arch}.${ext}"

directories:
  output: release/${version}
  buildResources: electron/build

files:
  - electron/**/*
  - dist-electron/**/*
  - server/dist/**/*
  - server/migrations/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"

asarUnpack:
  - "**/*.{node,dll,dylib,so}"
  - "node_modules/better-sqlite3/**/*"

extraMetadata:
  main: electron/main.cjs

asar: true

# After macOS signing (including ad-hoc), re-sign with the correct bundle
# identifier so NotificationCenter attributes notifications to "Fire Tools"
# instead of the default "Electron". See scripts/electron-after-sign.cjs.
afterSign: scripts/electron-after-sign.cjs

mac:
  category: public.app-category.finance
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/build/entitlements.mac.plist
  entitlementsInherit: electron/build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  # Code-signing & notarization driven via env:
  #   CSC_LINK, CSC_KEY_PASSWORD (signing cert)
  #   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID (notarization)
  notarize: false

win:
  legalTrademarks: ""
  target:
    - target: nsis
      arch:
        - x64
  # Sign via WINDOWS_CERTIFICATE_LINK / WINDOWS_CERTIFICATE_PASSWORD env when available.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Space-free for the same reason as the top-level artifactName above.
  artifactName: "Fire-Tools-Setup-${version}-${arch}.${ext}"
  shortcutName: Fire Tools
  uninstallDisplayName: Fire Tools ${version}
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  category: Finance
  target:
    - target: AppImage
      arch:
        - x64

publish:
  provider: github
  owner: fire-tools-inc
  repo: app
  releaseType: release
