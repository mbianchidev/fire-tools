name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify tag matches package.json version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Verify tag matches package.json version
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_CORE=$(node -e "const v=String(process.argv[1]??'').trim().replace(/^v/i,'');const m=v.match(/^(\\d+)\\.(\\d+)\\.(\\d+)/);process.stdout.write(m?(m[1]+'.'+m[2]+'.'+m[3]):'')" "$TAG")
          PKG_CORE=$(node -e "const v=String(process.argv[1]??'').trim().replace(/^v/i,'');const m=v.match(/^(\\d+)\\.(\\d+)\\.(\\d+)/);process.stdout.write(m?(m[1]+'.'+m[2]+'.'+m[3]):'')" "$PKG_VERSION")
          if [ -z "$TAG_CORE" ] || [ -z "$PKG_CORE" ]; then
            echo "::error::Could not parse tag '$TAG' or package.json version '$PKG_VERSION' as semver."
            exit 1
          fi
          if [ "$TAG_CORE" != "$PKG_CORE" ]; then
            echo "::error::Tag '$TAG' (core $TAG_CORE) does not match package.json version '$PKG_VERSION' (core $PKG_CORE)."
            echo "Bump the version field in package.json so it matches the tag, then re-tag."
            exit 1
          fi
          echo "Tag '$TAG' matches package.json version '$PKG_VERSION' (core $PKG_CORE)."

  build-macos:
    name: Build macOS DMG (${{ matrix.arch }})
    needs: verify
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm ci --prefix server

      - run: npm ci --prefix server

      - name: Verify macOS arch is concrete
        run: |
          case "${{ matrix.arch }}" in
            arm64|x64) ;;
            *)
              echo "::error::macOS release builds must use a concrete architecture, not '${{ matrix.arch }}'."
              exit 1
              ;;
          esac

      - name: Build Fire Tools and create DMG
        run: npm run electron:dist -- --publish never --mac dmg zip --${{ matrix.arch }}
        env:
          APP_VERSION: ${{ github.ref_name }}
          NODE_NO_WARNINGS: '1'
          DEBUG: electron-builder

      - name: Verify build output exists
        run: |
          if [ ! -d release ] || [ -z "$(find release -name '*.dmg' -print -quit)" ]; then
            echo "::error::electron-builder produced no DMG in release/ for ${{ matrix.arch }}. See the build step logs above."
            ls -la release 2>/dev/null || true
            exit 1
          fi
          echo "release/ contents:"
          find release -maxdepth 4 -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.blockmap' \) -print

      - name: Clear quarantine attributes
        run: |
          find release \( -name '*.dmg' -o -name '*.zip' \) -print0 | xargs -0 -I{} xattr -cr "{}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-artifacts-${{ matrix.arch }}
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.yml
            release/**/*.blockmap
          if-no-files-found: error

  build-windows:
    name: Build Windows Installer
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm ci --prefix server

      - run: npm ci --prefix server

      - name: Build Fire Tools and create Windows installer
        run: npm run electron:dist -- --publish never --win nsis --x64
        env:
          APP_VERSION: ${{ github.ref_name }}
          NODE_NO_WARNINGS: '1'
          DEBUG: electron-builder

      - name: Verify build output exists
        shell: bash
        run: |
          if [ ! -d release ] || [ -z "$(find release -name '*.exe' -print -quit)" ]; then
            echo "::error::electron-builder produced no .exe in release/. See the build step logs above."
            ls -la release 2>/dev/null || true
            exit 1
          fi
          echo "release/ contents:"
          find release -maxdepth 4 -type f \( -name '*.exe' -o -name '*.nupkg' -o -name '*.zip' -o -name '*.blockmap' \) -print

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-artifacts
          path: |
            release/**/*.exe
            release/**/*.nupkg
            release/**/*.zip
            release/**/*.yml
            release/**/*.blockmap
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-artifacts-arm64
          path: artifacts/macos/arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-artifacts-x64
          path: artifacts/macos/x64

      - name: Download Windows artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Stage release assets
        run: |
          set -euo pipefail
          rm -rf dist-assets
          mkdir -p dist-assets
          # Real download/update payloads (unique per-arch / per-OS names).
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.blockmap' \) -exec cp -f {} dist-assets/ \;
          # Windows auto-update manifest (single source).
          find artifacts/windows -type f -name 'latest.yml' -exec cp -f {} dist-assets/ \;
          # Merge the per-arch macOS manifests into one latest-mac.yml so a single,
          # non-colliding asset references both x64 and arm64 builds.
          python3 -c "import yaml" 2>/dev/null || pip install --quiet --break-system-packages pyyaml
          mapfile -t MAC_YML < <(find artifacts/macos -type f -name 'latest-mac.yml' | sort)
          python3 - "${MAC_YML[@]}" <<'PY'
          import sys, yaml
          paths = sys.argv[1:]
          merged, seen, files = None, set(), []
          for p in paths:
              with open(p) as fh:
                  data = yaml.safe_load(fh) or {}
              if merged is None:
                  merged = dict(data)
              for entry in data.get('files', []):
                  url = entry.get('url')
                  if url and url not in seen:
                      seen.add(url)
                      files.append(entry)
          if merged is not None:
              merged['files'] = files
              with open('dist-assets/latest-mac.yml', 'w') as fh:
                  yaml.safe_dump(merged, fh, sort_keys=False)
              print('Merged latest-mac.yml with %d file entry/entries' % len(files))
          PY
          # Guards: no non-asset manifests, no duplicate basenames.
          for bad in app-update.yml builder-debug.yml; do
            if [ -e "dist-assets/$bad" ]; then
              echo "::error::Unexpected non-asset file staged: $bad"
              exit 1
            fi
          done
          dupes=$(find dist-assets -type f -exec basename {} \; | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::Duplicate asset basenames would collide on the release:"
            echo "$dupes"
            exit 1
          fi
          echo "Staged release assets:"
          ls -la dist-assets

      - name: Verify update manifests reference staged assets
        run: |
          set -euo pipefail
          # Guard against the auto-updater 404 class of bug: every file the
          # update manifests point at (latest*.yml `files[].url` and `path`)
          # must actually be staged for upload under the exact same basename.
          # If an artifact name ever reintroduces a space (or any character the
          # manifest sanitizes but GitHub rewrites differently), this fails the
          # release instead of shipping an updater that can't download itself.
          python3 -c "import yaml" 2>/dev/null || pip install --quiet --break-system-packages pyyaml
          python3 - <<'PY'
          import glob, os, sys, yaml
          missing = []
          manifests = sorted(glob.glob('dist-assets/latest*.yml'))
          if not manifests:
              print('::error::No latest*.yml update manifests were staged.')
              sys.exit(1)
          for man in manifests:
              with open(man) as fh:
                  data = yaml.safe_load(fh) or {}
              refs = {e.get('url') for e in data.get('files', []) if e.get('url')}
              if data.get('path'):
                  refs.add(data['path'])
              for ref in sorted(refs):
                  if not os.path.exists(os.path.join('dist-assets', ref)):
                      missing.append((os.path.basename(man), ref))
          if missing:
              print('::error::Update manifest(s) reference assets that are not staged for upload:')
              for man, ref in missing:
                  print(f'  {man} -> {ref}')
              print('This would make the auto-updater 404. Check electron-builder artifactName (no spaces).')
              sys.exit(1)
          for man in manifests:
              print(f'OK: {os.path.basename(man)} references only staged assets')
          PY

      - name: Build release notes (changelog + installation)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Ask GitHub to generate the changelog for this tag (auto-detects the
          # previous tag and lists merged PRs / commits since then).
          CHANGELOG=$(gh api "repos/$REPO/releases/generate-notes" \
            -f tag_name="$TAG" --jq '.body' || true)
          if [ -z "$CHANGELOG" ]; then
            echo "::warning::Could not generate changelog notes; falling back to a compare link."
            CHANGELOG="**Full Changelog**: https://github.com/$REPO/commits/$TAG"
          fi
          {
            echo "$CHANGELOG"
            echo
            cat <<'EOF'
          ## Installation

          ### macOS
          1. Download the arm64 DMG for Apple Silicon Macs, or the x64 DMG for Intel Macs.
          2. Open the DMG and drag **Fire Tools** to Applications.
          3. If macOS blocks the app because it isn't notarized yet, run:
             ```sh
             xattr -cr "/Applications/Fire Tools.app"
             ```

          ### Windows
          1. Download the `Fire Tools Setup` `.exe`.
          2. Run the installer (Fire Tools installs per-user under `%LocalAppData%\Programs\fire-tools`).
          3. If SmartScreen warns about an unsigned installer, click **More info → Run anyway**.
          EOF
          } > release-notes.md
          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: false
          draft: false
          make_latest: 'true'
          files: |
            dist-assets/*
          body_path: release-notes.md
